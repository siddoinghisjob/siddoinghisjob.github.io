<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="assets/style.css">
    <title>To Do List</title>
</head>

<body>
    <div id="body">
        <div id="header">
            <span id="textHeader">To DO List</span>
        </div>
        <div id="main">
            <form>
                <input placeholder="Enter your task." id="task">
                <input placeholder="Enter your deadline." id="Deadline">
                <button id = "submit">Add task</button>
            </form>
            <div id="tasklist">
                <table>
                    <thead>
                        <th><b>TASK</b></th>
                        <th><b>DEADLINE</b></th>
                    </thead>
                    <tr>
                        <td>No Task Assigned</td>
                        <td>No Deadline Set</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <script src="assets/script.js"></script>
</body>

</html>
